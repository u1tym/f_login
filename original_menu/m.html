<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FFF2D9">
  <title>PORTAL — メニュー</title>
  <style>
    :root {
      --cream-top: #fff9ec;
      --cream-mid: #fff2d9;
      --cream-bottom: #f2e4c8;
      --icon-border: #5c3d2e;
      --icon-border-soft: #7a5542;
      --ink: #2f2118;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      /* 五角形ブロックの中心(50vh)から最上段アイコン中心までのおおよその距離 */
      --top-icon-rise: min(46vw, 21dvh, 172px);
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
      overflow: hidden;
    }

    html, body {
      margin: 0;
    }

    body {
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Yu Gothic", Meiryo, sans-serif;
      color: var(--ink);
      height: 100%;
      min-height: 100dvh;
      max-height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background-color: var(--cream-mid);
      background-image: linear-gradient(
        168deg,
        var(--cream-top) 0%,
        var(--cream-mid) 42%,
        var(--cream-bottom) 100%
      );
      background-attachment: fixed;
      -webkit-tap-highlight-color: transparent;
    }

    .wrap {
      flex: 1;
      min-height: 0;
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      padding: 0 clamp(0.75rem, 4vw, 1.1rem) calc(0.5rem + var(--safe-bottom));
      position: relative;
    }

    .site-title {
      position: absolute;
      /* 画面上端と最上段アイコン中心の中間付近に、文字の縦中心を合わせる */
      top: calc(
        var(--safe-top) + clamp(1.1rem, (50dvh - var(--top-icon-rise)) / 2, 44dvh)
      );
      left: 0;
      right: 0;
      z-index: 3;
      margin: 0;
      transform: translateY(-50%);
      padding-bottom: clamp(1rem, 4dvh, 1.75rem);
      pointer-events: none;
      text-align: center;
      font-size: clamp(1.12rem, 5.4vw, 1.58rem);
      font-weight: 600;
      letter-spacing: 0.48em;
      text-indent: 0.48em;
      color: rgba(47, 33, 24, 0.78);
      text-transform: uppercase;
    }

    .pentagon-center img,
    .pentagon a img {
      border-radius: 50%;
      border: 3px solid var(--icon-border);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.35) inset,
        0 10px 22px rgba(62, 42, 32, 0.2),
        0 4px 10px rgba(62, 42, 32, 0.14),
        0 0 0 1px var(--icon-border-soft);
    }

    /* 正五角形の頂点に5アイコン（塊の中心＝PORTALを画面のほぼ中央に） */
    .pentagon {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(92vw, 360px);
      max-width: 100%;
      max-height: min(92vw, 360px, 82dvh);
      aspect-ratio: 1;
      container-type: size;
      container-name: portal-pentagon;
    }

    .pentagon-center {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 1;
      width: 35cqmin;
      max-width: 120px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .pentagon-center img {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 1;
      object-fit: cover;
    }

    .pentagon a:nth-of-type(1) {
      --i: 0;
    }

    .pentagon a:nth-of-type(2) {
      --i: 1;
    }

    .pentagon a:nth-of-type(3) {
      --i: 2;
    }

    .pentagon a:nth-of-type(4) {
      --i: 3;
    }

    .pentagon a:nth-of-type(5) {
      --i: 4;
    }

    .pentagon a {
      --orbit: 38cqmin;
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 2;
      width: 28cqmin;
      max-width: 104px;
      padding: 0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: inherit;
      transform:
        translate(-50%, -50%)
        rotate(calc(var(--i) * 72deg))
        translateY(calc(-1 * var(--orbit)))
        rotate(calc(-1 * var(--i) * 72deg));
      transform-origin: center center;
      transition: transform 0.18s ease, opacity 0.18s ease;
      touch-action: manipulation;
    }

    .pentagon a:active {
      transform:
        translate(-50%, -50%)
        rotate(calc(var(--i) * 72deg))
        translateY(calc(-1 * var(--orbit)))
        rotate(calc(-1 * var(--i) * 72deg))
        scale(0.94);
      opacity: 0.9;
    }

    .pentagon a img {
      width: 100%;
      height: auto;
      display: block;
      aspect-ratio: 1;
      object-fit: cover;
    }

    @supports not (width: 1cqmin) {
      .pentagon-center {
        width: min(32vw, 15.5dvh, 112px);
      }

      .pentagon a {
        --orbit: min(35vw, 17dvh, 132px);
        width: min(26vw, 12.8dvh, 96px);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="site-title">PORTAL</h1>
    <nav class="pentagon" aria-label="メインメニュー">
      <div class="pentagon-center">
        <img src="images/PORTAL.jpg" alt="PORTAL" width="400" height="400">
      </div>
      <a href="knowhow/" aria-label="ノウハウ">
        <img src="images/KNOWHOW.jpg" alt="" width="400" height="400">
      </a>
      <a href="goods/" aria-label="グッズ">
        <img src="images/GOODS.jpg" alt="" width="400" height="400">
      </a>
      <a href="cache/" aria-label="お金">
        <img src="images/MONEY.jpg" alt="" width="400" height="400">
      </a>
      <a href="schedule/" aria-label="スケジュール">
        <img src="images/SCHEDULE.jpg" alt="" width="400" height="400">
      </a>
      <a href="recipe/" aria-label="レシピ">
        <img src="images/RECIPE.png" alt="" width="400" height="400">
      </a>
    </nav>
  </div>
  <script>
    (function () {
      var nav = document.querySelector("nav.pentagon");
      if (!nav) return;

      nav.addEventListener("click", function (e) {
        var a = e.target.closest("a[href]");
        if (!a || !nav.contains(a)) return;

        e.preventDefault();

        var url = new URL(a.getAttribute("href"), window.location.href);
        var n = Math.floor(Math.random() * 999999999) + 1;
        url.searchParams.set("a", String(n));

        window.location.assign(url.href);
      });
    })();
  </script>
</body>
</html>
